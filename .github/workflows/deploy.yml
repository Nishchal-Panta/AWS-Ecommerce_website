name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install shared layer deps
        run: cd backend/layers/shared/nodejs && npm install

      - name: Build Lambda functions
        run: |
          for fn in products cart orders notify auth; do
            cd backend/functions/$fn
            npm install
            npm run build
            cd ../../..
          done

      - name: SAM build and deploy
        run: |
          sam build
          sam deploy \
            --stack-name ecommerce-app \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install and build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_COGNITO_REGION: ap-south-1
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ap-south-1_mLsRv6Cu4
          NEXT_PUBLIC_COGNITO_CLIENT_ID: jvr7ucu0jvbrf9u7g07b26k7t
          NEXT_PUBLIC_COGNITO_DOMAIN: https://ecommerce-nishchal.auth.ap-south-1.amazoncognito.com
          NEXT_PUBLIC_API_URL: https://150ouvhn24.execute-api.ap-south-1.amazonaws.com/prod
        run: |
          npm install
          npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/out/ s3://ecommerce-frontend-379992420751 \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"
          aws s3 sync frontend/out/ s3://ecommerce-frontend-379992420751 \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1SJ4GH8K5MPZO \
            --paths "/*"

      - name: Done
        run: echo "Deployed to https://d2bmtm5fjdmhwb.cloudfront.net"
