AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "E-commerce platform \u2014 SAM template"
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 128
    Layers:
    - Ref: SharedLayer
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        PRODUCTS_TABLE: ecommerce-products
        CARTS_TABLE: ecommerce-carts
        ORDERS_TABLE: ecommerce-orders
        FRONTEND_URL: https://d2bmtm5fjdmhwb.cloudfront.net
Parameters:
  UserPoolId:
    Type: String
    Default: ap-south-1_mLsRv6Cu4
  UserPoolClientId:
    Type: String
    Default: jvr7ucu0jvbrf9u7g07b26k7t
Resources:
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ecommerce-shared
      ContentUri: ../../backend/layers/shared
      CompatibleRuntimes:
      - nodejs20.x
      RetentionPolicy: Delete
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
        - http://localhost:3000
        - https://d2bmtm5fjdmhwb.cloudfront.net
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        MaxAge: 600
        AllowCredentials: false
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer:
                Fn::Sub: https://cognito-idp.ap-south-1.amazonaws.com/${UserPoolId}
              audience:
              - Ref: UserPoolClientId
  ProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ecommerce-products
      CodeUri: ProductsFunction
      Handler: dist/handler.handler
      Role:
        Fn::Sub: arn:aws:iam::379992420751:role/ecommerce-products-role
      Events:
        ListProducts:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /products
            Method: GET
            Auth:
              Authorizer: NONE
        GetProduct:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /products/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        CreateProduct:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /products
            Method: POST
        UpdateProduct:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /products/{id}
            Method: PUT
        DeleteProduct:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /products/{id}
            Method: DELETE
    Metadata:
      SamResourceId: ProductsFunction
  CartFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ecommerce-cart
      CodeUri: CartFunction
      Handler: dist/handler.handler
      Role:
        Fn::Sub: arn:aws:iam::379992420751:role/ecommerce-cart-role
      Events:
        GetCart:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /cart
            Method: GET
        UpdateCart:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /cart
            Method: POST
        ClearCart:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /cart
            Method: DELETE
    Metadata:
      SamResourceId: CartFunction
  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ecommerce-orders
      CodeUri: OrdersFunction
      Handler: dist/handler.handler
      Role:
        Fn::Sub: arn:aws:iam::379992420751:role/ecommerce-orders-role
      Events:
        ListOrders:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /orders
            Method: GET
        GetOrder:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /orders/{id}
            Method: GET
        CreateOrder:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /orders
            Method: POST
    Metadata:
      SamResourceId: OrdersFunction
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ecommerce-auth
      CodeUri: AuthFunction
      Handler: dist/handler.handler
      Role:
        Fn::Sub: arn:aws:iam::379992420751:role/ecommerce-auth-role
      Events:
        SyncUser:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /auth/sync
            Method: POST
        GetMe:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /auth/me
            Method: GET
    Metadata:
      SamResourceId: AuthFunction
  NotifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ecommerce-notify
      CodeUri: NotifyFunction
      Handler: dist/handler.handler
      Role:
        Fn::Sub: arn:aws:iam::379992420751:role/ecommerce-notify-role
      Events:
        OrderQueue:
          Type: SQS
          Properties:
            Queue:
              Fn::Sub: arn:aws:sqs:ap-south-1:379992420751:ecommerce-orders
            BatchSize: 1
            FunctionResponseTypes:
            - ReportBatchItemFailures
    Metadata:
      SamResourceId: NotifyFunction
Outputs:
  ApiUrl:
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.ap-south-1.amazonaws.com/prod
    Export:
      Name: ecommerce-api-url
